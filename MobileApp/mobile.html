<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping App</title>
    <link rel="stylesheet" href="mobile.css" />
    <link rel="icon" type="image/x-icon" href="icon-192.png" />
    <script src="dexie.min.js"></script>
  </head>
  <body>
    <nav>
      <p>My List</p>
    </nav>
    <div class="container">
      <form id="itemForm">
        <label>
          Name of Item:
          <input type="text" id="nameInput" required />
        </label>

        <label>
          Quantity:
          <input type="text" id="quantityInput" value="1" />
        </label>

        <label>
          Price:
          <input type="text" id="priceInput" value="0" />
        </label>

        <button type="submit" id="addItemButton">Add item</button>
      </form>
    </div>

    <div id="itemDiv">
      <div class="item">
        <label>
          <input type="checkbox" class="checkbox" checkedox />
        </label>
        <div class="itemInfo">
          <p>Fruit Juice</p>
          <p>$5 x 3</p>
        </div>
        <button class="deleteButton">X</button>
      </div>

      <div class="item purchased">
        <label>
          <input type="checkbox" class="checkbox" checkedox />
        </label>
        <div class="itemInfo">
          <p>Fruit Juice</p>
          <p>$5 x 3</p>
        </div>
        <button class="deleteButton">X</button>
      </div>

      <div id="totalPriceDiv">Total price : $15</div>
    </div>

    <script src="mobile.js"></script>
  </body>
</html>
